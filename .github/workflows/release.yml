name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter "./packages/*" build

      # pnpm pack rewrites `workspace:*` deps to the real version inside each
      # tarball; npm then uploads them over OIDC (no token, auto-provenance).
      - name: Pack packages
        run: |
          mkdir -p "$RUNNER_TEMP/tarballs"
          for pkg in core react vue; do
            (cd "packages/$pkg" && pnpm pack --pack-destination "$RUNNER_TEMP/tarballs")
          done

      - name: Publish to npm (trusted publishing)
        run: |
          for tgz in "$RUNNER_TEMP"/tarballs/*.tgz; do
            npm publish "$tgz" --access public
          done
